name: PR Lint (Rule 16 + Rule 22 + no-AI-attribution)

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
  issue_comment:
    types: [created, edited]

jobs:
  pr-no-ai-attribution:
    name: No AI attribution (Layer 3)
    runs-on: ubuntu-latest
    # For issue_comment events: only run on PR comments (not issue comments)
    if: github.event_name == 'pull_request' || github.event.issue.pull_request
    permissions:
      pull-requests: read
      contents: read
    steps:
      - name: Checkout repo (for helper script)
        uses: actions/checkout@v4

      - name: Scan PR body for AI attribution markers
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          PR_BODY=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json body --jq '.body // ""')
          printf '%s' "$PR_BODY" | bash scripts/ci/pr-lint-no-ai-attribution.sh

      - name: Scan PR comment for AI attribution markers
        if: github.event_name == 'issue_comment'
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          printf '%s' "$COMMENT_BODY" | bash scripts/ci/pr-lint-no-ai-attribution.sh


  pr-lint:
    name: QA gate check (Rule 16)
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      contents: read
    steps:
      - name: Fetch PR body and changed files, then run Rule 16 linter
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          PR_BODY=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json body --jq '.body // ""')
          CHANGED_FILES=$(gh api "repos/$REPO/pulls/$PR_NUMBER/files" --paginate --jq '.[].filename')

          # ---------------------------------------------------------------
          # scripts/ci/pr-lint-check.sh — inlined (POSIX-portable)
          # ---------------------------------------------------------------

          # 1. Classify by changed file paths
          is_ui_or_flow=0

          OLD_IFS="$IFS"
          IFS='
          '
          for filepath in $CHANGED_FILES; do
            case "$filepath" in
              apps/*/app/*|apps/*/components/*|apps/*/pages/*|apps/*/routes/*|apps/*/forms/*|apps/*/auth/*|apps/*/session/*)
                is_ui_or_flow=1
                break
                ;;
            esac
          done
          IFS="$OLD_IFS"

          # 2. Classify by user-flow keywords in PR body
          if [ "$is_ui_or_flow" = "0" ]; then
            body_lower=$(printf '%s' "$PR_BODY" | tr '[:upper:]' '[:lower:]')
            case "$body_lower" in
              *"new route"*|*"new form"*|*"state transition"*|*"auth flow"*|*"session lifecycle"*|*"user flow"*)
                is_ui_or_flow=1
                ;;
            esac
          fi

          # 3. Exempt — not UI or user-flow
          if [ "$is_ui_or_flow" = "0" ]; then
            echo "PR is not UI or user-flow — exempt from Rule 16."
            exit 0
          fi

          # 4. Require QA-Report: or QA-Waiver: marker
          has_marker=0
          case "$PR_BODY" in
            *"QA-Report:"*|*"QA-Waiver:"*)
              has_marker=1
              ;;
          esac

          if [ "$has_marker" = "1" ]; then
            echo "Rule 16 satisfied — QA marker found."
            exit 0
          fi

          # 5. Violation
          echo "Rule 16 violation: This PR touches UI or user-flow paths but is missing a" >&2
          echo "QA-Report: or QA-Waiver: entry in the PR body." >&2
          echo "" >&2
          echo "Required action: Run Akali via Playwright MCP to produce a QA report, then" >&2
          echo "add one of the following lines to your PR description:" >&2
          echo "  QA-Report: assessments/qa-reports/<date>-akali-<slug>.md" >&2
          echo "  QA-Waiver: <reason>" >&2
          echo "" >&2
          echo "See CLAUDE.md Rule 16 and .claude/agents/akali.md for details." >&2
          exit 1

  pr-frontend-markers:
    # Rule 22 / D7 — Frontend / UI marker gate.
    # Runs on PRs to main that touch UI file paths (D1 glob).
    # Requires at least one non-empty marker from:
    #   Design-Spec:, Accessibility-Check:, Visual-Diff:
    # or a UX-Waiver: line in the PR body.
    #
    # Plan: plans/approved/personal/2026-04-25-frontend-uiux-in-process.md T-E3
    name: Frontend / UI markers (Rule 22)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: read
      contents: read
    steps:
      - name: Checkout repo (for lint script)
        uses: actions/checkout@v4

      - name: Extract changed files
        id: changed
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          CHANGED_FILES=$(gh pr diff --name-only "$PR_NUMBER" --repo "$REPO" | tr '\n' ' ')
          echo "files=$CHANGED_FILES" >> "$GITHUB_OUTPUT"

      - name: Run frontend-markers lint
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
        run: |
          PR_BODY=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json body --jq '.body // ""')
          printf '%s' "$PR_BODY" | bash scripts/ci/pr-lint-frontend-markers.sh - "$CHANGED_FILES"
